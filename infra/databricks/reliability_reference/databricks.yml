bundle:
  name: tfl-reliability-reference-t3

databricks_cli_version: ">= 0.236.0"

variables:
  catalog_name:
    description: Existing Free Edition workspace catalog.
  run_suffix:
    description: Lowercase UTC date plus short commit, for isolated resources.

sync:
  paths:
    - ../../../benchmark/reliability_reference
    - ./src
  include:
    - benchmark/reliability_reference/contracts/**
    - benchmark/reliability_reference/expected/**
    - benchmark/reliability_reference/fixtures/**
    - benchmark/reliability_reference/scenarios/**
    - benchmark/reliability_reference/*.py
    - infra/databricks/reliability_reference/src/**
  exclude:
    - "**/__pycache__/**"

resources:
  schemas:
    managed_schema:
      name: tfl_reliability_t3_${var.run_suffix}
      catalog_name: ${var.catalog_name}
      comment: Temporary, constructed-fixture reliability proof; destroy in the same session.
  volumes:
    evidence_volume:
      name: evidence
      catalog_name: ${var.catalog_name}
      schema_name: ${resources.schemas.managed_schema.name}
      volume_type: MANAGED
  jobs:
    managed_proof:
      name: tfl-reliability-t3-${var.run_suffix}
      tasks:
        - task_key: run_constructed_cases
          spark_python_task:
            python_file: ./src/managed_job.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${resources.schemas.managed_schema.name}
              - --volume
              - ${resources.volumes.evidence_volume.name}
              - --run-scope
              - ${var.run_suffix}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
    cleanup:
      name: tfl-reliability-t3-cleanup-${var.run_suffix}
      tasks:
        - task_key: drop_managed_tables
          spark_python_task:
            python_file: ./src/cleanup_job.py
            parameters:
              - --catalog
              - ${var.catalog_name}
              - --schema
              - ${resources.schemas.managed_schema.name}
              - --run-scope
              - ${var.run_suffix}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"

targets:
  free_edition:
    default: true
    mode: development
