version: 2

unit_tests:
  - name: dim_station_history_versions_a_changed_capacity
    model: dim_station_history
    given:
      - input: ref('stg_bikepoint_snapshot')
        rows:
          - {snapshot_date: 2026-07-01, bikepoint_id: 42, common_name: Test Dock, lat: 51.5000, lon: -0.1200, n_docks: 20, installed: true, locked: false}
          - {snapshot_date: 2026-07-02, bikepoint_id: 42, common_name: Test Dock, lat: 51.5000, lon: -0.1200, n_docks: 20, installed: true, locked: false}
          - {snapshot_date: 2026-07-03, bikepoint_id: 42, common_name: Test Dock, lat: 51.5000, lon: -0.1200, n_docks: 22, installed: true, locked: false}
    expect:
      rows:
        - {bikepoint_id: 42, common_name: Test Dock, lat: 51.5000, lon: -0.1200, n_docks: 20, installed_state: "true", locked_state: "false", valid_from: 2026-07-01, valid_to: 2026-07-03, is_current: false}
        - {bikepoint_id: 42, common_name: Test Dock, lat: 51.5000, lon: -0.1200, n_docks: 22, installed_state: "true", locked_state: "false", valid_from: 2026-07-03, valid_to: null, is_current: true}

models:
  - name: dim_station_history
    description: >
      BikePoint station attributes versioned at bikepoint_id x attribute-version grain.
      It is separate from journey dim_station because the source-name mapping is not
      universally conforming.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [bikepoint_id, valid_from]
    columns:
      - name: bikepoint_id
        tests: [not_null]
      - name: valid_from
        tests: [not_null]
      - name: is_current
        tests:
          - accepted_values:
              arguments: {values: [true, false]}

  - name: dim_station
    description: Stations unified across both ID regimes by cleaned name (ADR-0002 context).
    columns:
      - name: station_key
        tests: [unique, not_null]
      - name: station_name
        tests: [unique, not_null]

  - name: dim_date
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: date_day
        tests: [unique, not_null]

  - name: daily_journey_stats
    description: Power BI rollup — one row per day.
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: journeys
        tests:
          - dbt_utils.accepted_range:
              min_value: 1

  - name: station_daily_flows
    description: Power BI rollup — departures/arrivals per station per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [date_key, station_key]
    columns:
      - name: station_key
        tests: [not_null]

  - name: bikepoint_daily_snapshot
    description: Daily dock-status snapshot; one row per dock per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [snapshot_date, bikepoint_id]
    columns:
      - name: bikepoint_id
        tests: [not_null]
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: station_key
        description: Nullable — populated only where the dock name matches a journey-file station name.
        tests:
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: n_bikes
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: line_status_daily
    description: >
      Daily line status; one row per line per distinct status per day. A line can carry two
      statuses at the SAME severity + description that differ only in the reason text (e.g.
      Weaver on 2026-07-13: "Part Suspended" twice, one adding "SEVERE DELAYS on the rest of
      the line") — so disruption_reason is part of the natural key.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [snapshot_date, line_id, status_severity, status_description, disruption_reason]
    columns:
      - name: line_id
        tests: [not_null]
      - name: mode
        tests:
          - accepted_values:
              arguments: {values: ["tube", "dlr", "overground", "elizabeth-line", "tram"]}
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

  - name: fact_journey
    description: One row per hire, 2022 → present.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [era, rental_id]
    columns:
      - name: journey_key
        tests: [unique, not_null]
      - name: duration_s
        description: Ride time in seconds; broken hires (<=0) were quarantined upstream.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              inclusive: true
      - name: start_date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
          - dbt_utils.accepted_range:
              min_value: 20211201
              max_value: 20281231
      - name: start_station_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: end_station_key
        description: Nullable only if the source row lacked both end code and name (quarantined upstream, so expected non-null).
        tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
