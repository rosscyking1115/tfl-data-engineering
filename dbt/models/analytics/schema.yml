version: 2

models:
  - name: expected_demand
    description: Weather-adjusted expected daily departures per station × day-of-week × weather bucket.
    columns:
      - name: expected_departures
        tests:
          - not_null
          - dbt_utils.accepted_range: { min_value: 0, inclusive: true }
      - name: n_observations
        tests: [not_null]

  - name: demand_deviation
    description: Actual vs weather-adjusted expected departures, per station per day, disruption-flagged.
    columns:
      - name: station_key
        tests: [not_null]
      - name: date_key
        tests: [not_null]
      - name: departures
        tests:
          - not_null
          - dbt_utils.accepted_range: { min_value: 0, inclusive: true }

  - name: demand_deviation_ml
    description: Actual vs the LightGBM counterfactual baseline, per station per day, disruption-flagged.
    columns:
      - name: station_key
        tests: [not_null]
      - name: date_key
        tests: [not_null]
      - name: departures
        tests:
          - not_null
          - dbt_utils.accepted_range: { min_value: 0, inclusive: true }
      - name: expected_departures
        tests:
          - not_null
          - dbt_utils.accepted_range: { min_value: 0, inclusive: true }
