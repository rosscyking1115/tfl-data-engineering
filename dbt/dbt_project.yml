name: tfl_pipeline
version: "1.0.0"
profile: tfl_snowflake

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: target
clean-targets: [target, dbt_packages]

models:
  tfl_pipeline:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: gold
    # Durable analytics layer — runs on the duckdb target over committed Parquet,
    # no warehouse. Select with: dbt build --target duckdb --select tag:analytics
    analytics:
      +tags: ["analytics"]

seeds:
  tfl_pipeline:
    disruption_dates:
      +tags: ["analytics"]
