# Credentials come from .env (loaded by infra/run_dbt.ps1) — never hardcoded here.
tfl_snowflake:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      warehouse: TFL_WH
      database: TFL
      schema: silver
      threads: 4
    # Durable, warehouse-free target for the analytics layer. Reads/writes the
    # committed gold Parquet via DuckDB. Run dbt from the repo root so the
    # relative Parquet paths resolve.
    duckdb:
      type: duckdb
      path: ":memory:"
      extensions:
        - parquet
      threads: 4
