# Credentials come from .env (loaded by infra/run_dbt.ps1) — never hardcoded here.
tfl_snowflake:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      warehouse: TFL_WH
      database: TFL
      schema: silver
      threads: 4
    # Durable, warehouse-free target. Since the rigor-pass port (C3) this runs the FULL
    # DAG — staging + marts from local silver Parquet, plus the analytics layer over the
    # committed gold Parquet. Run dbt from the repo root so relative paths resolve.
    # Local file db (gitignored) so big builds spill to disk and results are inspectable.
    duckdb:
      type: duckdb
      path: "dbt/tfl_local.duckdb"
      extensions:
        - parquet
      threads: 2
      settings:
        # 41M-row fact build: cap memory well under free RAM (machine runs WSL2 etc, so
        # ~8GB free is typical) and let DuckDB spill beside the file db. Do NOT set
        # temp_directory here — dbt-duckdb re-applies settings per thread and DuckDB
        # refuses to switch temp dirs once used; the file-backed default spill is fine.
        memory_limit: "4GB"
        preserve_insertion_order: false
