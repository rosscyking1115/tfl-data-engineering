name: ci

# Lint + tests on every push to main and every PR. Keeps the pure-Python logic
# (feature engineering, the no-API Quick answers, the assistant's tool dispatch) honest.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt -r ml/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check app ml tests ingestion

      - name: Tests (pytest)
        run: pytest
