name: daily-tfl-snapshot

# The durable runtime: a free scheduled job (public repo) that keeps the live
# layer fresh with no server, no warehouse. Cron is best-effort, so it's off-the-hour
# and the loader is idempotent/catch-up; a healthcheck ping is the dead-man's-switch.
on:
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily (off-the-hour on purpose)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install --quiet requests pandas pyarrow

      - name: Pull TfL live snapshot -> Parquet
        run: python ingestion/live_snapshot.py

      - name: Commit updated snapshot
        run: |
          git config user.name "rosscyking1115"
          git config user.email "rosscyking1115@gmail.com"
          git add app/gold_export/live_*.parquet
          if git diff --quiet --cached; then
            echo "no changes to commit"
          else
            git commit -m "chore(data): daily TfL live snapshot [skip ci]"
            git push
          fi

      - name: Dead-man's-switch ping (only if configured)
        if: ${{ success() && env.HEALTHCHECK_URL != '' }}
        run: curl -fsS --retry 3 "$HEALTHCHECK_URL" || true
