name: daily-tfl-snapshot

# The durable runtime: a free scheduled job (public repo) that keeps the live layer fresh
# with no server, no warehouse. Since the rigor pass this is the FULL gated daily pipeline:
# snapshot -> journey-CSV increment -> dbt build + tests (quality gates delivery) -> commit
# -> run-log. Cron is best-effort, so it's off-the-hour and every step is idempotent; a
# failure auto-opens an issue (plus the optional healthcheck dead-man's-switch).
on:
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily (off-the-hour on purpose)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (pinned to the locally-verified stack)
        run: pip install --quiet requests==2.34.2 pandas==3.0.3 pyarrow==24.0.0 duckdb==1.5.4 dbt-duckdb

      - name: Snapshot TfL live layer (permanent-if-collected)
        run: python ingestion/live_snapshot.py

      - name: Ingest newly published journey CSVs (no-op when up to date)
        run: python ingestion/journey_increment.py

      - name: Rebuild + test the analytics layer (gates delivery)
        run: |
          dbt deps --project-dir dbt --profiles-dir dbt
          dbt build --target duckdb --select +tag:analytics --project-dir dbt --profiles-dir dbt
          dbt source freshness --target duckdb --project-dir dbt --profiles-dir dbt

      - name: Append run metadata
        run: python ingestion/run_log.py

      - name: Commit refreshed data
        run: |
          git config user.name "rosscyking1115"
          git config user.email "rosscyking1115@gmail.com"
          git add app/gold_export/
          if git diff --quiet --cached; then
            echo "no changes to commit"
          else
            git commit -m "chore(data): daily TfL refresh [skip ci]"
            git push
          fi

      - name: Dead-man's-switch ping (only if configured)
        if: ${{ success() && env.HEALTHCHECK_URL != '' }}
        run: curl -fsS --retry 3 "$HEALTHCHECK_URL" || true

      - name: Open an issue on failure (a red run must be impossible to miss)
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Daily pipeline failed: $(date -u +%F)" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          A missed disruption snapshot is a permanent hole — investigate today.
          (Common causes: TfL API shape change caught by the quality/schema gates, or a dbt test failure gating delivery.)" \
            --label "pipeline"
