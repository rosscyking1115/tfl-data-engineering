name: reliability-reference-release

on:
  workflow_dispatch:
    inputs:
      owner_approval:
        description: Type RELEASE to publish the accepted v0.2.0 fallback after independent review.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce manual owner gate
        env:
          OWNER_APPROVAL: ${{ inputs.owner_approval }}
        run: test "$OWNER_APPROVAL" = "RELEASE"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build policy-gated release assets
        run: >-
          python scripts/build_reliability_release.py
          --version "0.2.0"
          --managed-result "NARROW"
          --target "45125f1e064f28ce03ef7e0f15acceb18c34604f"
          --output release-output
      - name: Create repository release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "v0.2.0"
          release-output/reliability-reference-v0.2.0.zip
          release-output/reliability-reference-v0.2.0.spdx.json
          release-output/release-manifest.json
          release-output/SHA256SUMS
          --target "45125f1e064f28ce03ef7e0f15acceb18c34604f"
          --title "Reliability reference v0.2.0"
          --notes-file release-output/RELEASE_NOTES.md
