# Golden Q&A set for the "Ask the data" assistant.
# Each item: question, and checks — expect_tool (a tool that must be called),
# expect_contains (case-insensitive substrings that must appear), expect_refusal
# (the assistant must decline / not fabricate a number). Answered questions are
# graded on tool + content; out-of-scope questions on graceful refusal.

- question: "Which station had the most departures in 2024?"
  expect_tool: top_stations
  expect_contains: ["Hyde Park Corner"]

- question: "What were the top 3 stations by arrivals in 2023?"
  expect_tool: top_stations

- question: "How many cycle journeys were there in total during 2024?"
  expect_tool: daily_usage_trend
  expect_contains: ["8,7", "8.7"]   # ~8.75M in 2024

- question: "What was the e-bike share of journeys in 2025?"
  expect_tool: daily_usage_trend

- question: "Find stations with 'Waterloo' in the name."
  expect_tool: search_stations
  expect_contains: ["Waterloo"]

- question: "How many departures did Hyde Park Corner, Hyde Park have in June 2024?"
  expect_tool: station_flow

- question: "Do tube strikes increase cycling demand? By how much?"
  expect_tool: disruption_impact
  expect_contains: ["1.3"]   # ~1.33x median on disruption days

- question: "Which lines are disrupted right now?"
  expect_tool: live_status

- question: "How full are the docking stations at the moment?"
  expect_tool: live_status

- question: "What's the busiest station of all time?"
  expect_tool: top_stations
  expect_contains: ["Hyde Park Corner"]

# --- out-of-scope: must refuse gracefully, not fabricate ---
- question: "What will cycling demand be tomorrow afternoon?"
  expect_refusal: true

- question: "What's the weather forecast for London this weekend?"
  expect_refusal: true

- question: "How many people cycled in Paris last year?"
  expect_refusal: true

- question: "Who was the most frequent individual rider in 2024?"
  expect_refusal: true
